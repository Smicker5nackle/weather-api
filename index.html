<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Beautiful weather app - Get real-time weather information for any location worldwide.">
    <title>WeatherNow — Live Weather Updates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="aurora-bg">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
        <div class="aurora-blob blob-3"></div>
    </div>

    <main class="app-container">
        <!-- Search Section -->
        <div class="search-section" id="search-section">
            <h1 class="app-title">
                <span class="title-icon">☁️</span>
                WeatherNow
            </h1>
            <p class="app-subtitle">Discover real-time weather for any location</p>

            <div class="search-box" id="search-box">
                <div class="search-input-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input
                        type="text"
                        id="location-input"
                        placeholder="Search city, zip code, or coordinates..."
                        autocomplete="off"
                    >
                    <button class="gps-btn" id="gps-btn" title="Use my location">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
                        </svg>
                    </button>
                </div>
                <button class="search-btn" id="search-btn">
                    Get Weather
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>

            <div class="error-msg" id="error-msg"></div>
        </div>

        <!-- Loading Spinner -->
        <div class="loader-container hidden" id="loader">
            <div class="loader-ring"></div>
            <p class="loader-text">Fetching weather data...</p>
        </div>

        <!-- Weather Result Card -->
        <div class="weather-card hidden" id="weather-card">
            <button class="back-btn" id="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                New Search
            </button>

            <div class="weather-header">
                <div class="location-info">
                    <h2 class="city-name" id="city-name">—</h2>
                    <p class="region-country" id="region-country">—</p>
                    <p class="local-time" id="local-time">—</p>
                </div>
                <div class="weather-icon-wrap">
                    <img id="weather-icon" src="" alt="Weather icon" class="weather-icon">
                    <p class="condition-text" id="condition-text">—</p>
                </div>
            </div>

            <div class="temp-display">
                <span class="temp-value" id="temp-value">—</span>
                <span class="temp-unit">°C</span>
            </div>

            <p class="feels-like" id="feels-like">Feels like —°C</p>

            <div class="details-grid">
                <div class="detail-card" id="detail-humidity">
                    <div class="detail-icon">💧</div>
                    <div class="detail-info">
                        <span class="detail-label">Humidity</span>
                        <span class="detail-value" id="humidity">—%</span>
                    </div>
                </div>
                <div class="detail-card" id="detail-wind">
                    <div class="detail-icon">💨</div>
                    <div class="detail-info">
                        <span class="detail-label">Wind</span>
                        <span class="detail-value" id="wind">— km/h</span>
                    </div>
                </div>
                <div class="detail-card" id="detail-pressure">
                    <div class="detail-icon">🌡️</div>
                    <div class="detail-info">
                        <span class="detail-label">Pressure</span>
                        <span class="detail-value" id="pressure">— mb</span>
                    </div>
                </div>
                <div class="detail-card" id="detail-visibility">
                    <div class="detail-icon">👁️</div>
                    <div class="detail-info">
                        <span class="detail-label">Visibility</span>
                        <span class="detail-value" id="visibility">— km</span>
                    </div>
                </div>
                <div class="detail-card" id="detail-uv">
                    <div class="detail-icon">☀️</div>
                    <div class="detail-info">
                        <span class="detail-label">UV Index</span>
                        <span class="detail-value" id="uv">—</span>
                    </div>
                </div>
                <div class="detail-card" id="detail-cloud">
                    <div class="detail-icon">☁️</div>
                    <div class="detail-info">
                        <span class="detail-label">Cloud Cover</span>
                        <span class="detail-value" id="cloud">—%</span>
                    </div>
                </div>
            </div>

            <!-- Air Quality Section -->
            <div class="aqi-section" id="aqi-section">
                <h3 class="aqi-title">🌿 Air Quality</h3>
                <div class="aqi-bar-container">
                    <div class="aqi-bar">
                        <div class="aqi-fill" id="aqi-fill"></div>
                    </div>
                    <span class="aqi-label" id="aqi-label">—</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <p>Powered by <a href="https://www.weatherapi.com/" target="_blank" rel="noopener">WeatherAPI</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
